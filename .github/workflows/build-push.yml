name: Build and Push

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Download NopeCHA extension
        run: |
          mkdir -p extensions/nopecha
          wget -q -O /tmp/nopecha.zip \
            "https://github.com/NopeCHALLC/nopecha-extension/releases/download/0.5.5/chromium_automation.zip"
          unzip -o /tmp/nopecha.zip -d extensions/nopecha

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: registry.akshaydeshraj.me
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            registry.akshaydeshraj.me/agentic-browser:latest
            registry.akshaydeshraj.me/agentic-browser:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
